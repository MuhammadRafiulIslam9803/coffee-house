<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Coffee House</title>
        <!-- tailwind link -->
        <script
            src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        <!-- fontAwsome link  -->
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="

        <!-- google fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700;800;900&display=swap"

        <!-- css link -->
        <link rel="stylesheet" href="styles/style.css">

    <body class="max-w-7xl mx-auto ">
        <!-- Banner section  -->
        <section
            class=" container  flex flex-col-reverse lg:flex-row items-center ">

            <main class="w-full lg:w-1/2">
                <h1 class="text-5xl font-semibold">It's good <br>
                    tea time at The Tea House</h1>
                <p class="my-7">Tea and Botanical Solutions Supplier Give
                    Optimum <br> Satisfaction To Your Taste Buds.</p>
                <button class="btn bg-amber-500 p-2 rounded">Explore Now <i
                        class="fa-solid fa-arrow-right"></i></button>
            </main>
            <aside>
                <img class src="images/banner.png" alt>
                <div class="flex items-center gap-2 relative -top-20 -right-12 py-4 px-2 rounded-2xl shadow-2xl w-1/3">
                    <span class="p-2 text-3xl"><i class="fa-solid text-amber-700 fa-star"></i></span>
                    <div class=" text-sm font-semibold">
                        <p >5</p>
                        <p>Trust Pilot Ratings</p>  
                    </div>
                </div>
            </aside>

        </section>
